server {
  listen 8080;
  server_name _;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Access-Control-Allow-Origin "${FRONTEND_PUBLIC_ORIGIN}" always;
  add_header Access-Control-Allow-Credentials "true" always;
  add_header Vary "Origin" always;

  client_max_body_size 2m;
  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 30s;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;

  if ($request_method = OPTIONS) {
    add_header Access-Control-Allow-Origin "${FRONTEND_PUBLIC_ORIGIN}" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Origin, X-Requested-With, X-XSRF-TOKEN" always;
    add_header Content-Length 0;
    add_header Content-Type "text/plain; charset=UTF-8";
    return 204;
  }

  location /auth/ {
    proxy_pass http://${AUTH_SERVICE_UPSTREAM};
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://${API_SERVICE_UPSTREAM};
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /audit/ {
    proxy_pass http://${AUDIT_SERVICE_UPSTREAM};
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /auth/actuator/prometheus {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    proxy_pass http://${AUTH_SERVICE_UPSTREAM}/actuator/prometheus;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/actuator/prometheus {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    proxy_pass http://${API_SERVICE_UPSTREAM}/actuator/prometheus;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /audit/actuator/prometheus {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    proxy_pass http://${AUDIT_SERVICE_UPSTREAM}/actuator/prometheus;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /gateway/health {
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /gateway/status {
    proxy_pass http://${API_SERVICE_UPSTREAM}/api/dashboard-status;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /notify/twilio/status {
    proxy_pass http://${NOTIFICATION_SERVICE_UPSTREAM}/twilio/status;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = / {
    default_type application/json;
    return 404 '{"error":"not_found"}';
  }

  location / {
    default_type application/json;
    return 404 '{"error":"not_found"}';
  }
}
