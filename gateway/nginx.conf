server {
  listen 8080;
  server_name _;
  resolver ${DNS_RESOLVER} valid=10s ipv6=off;

  set $auth_service http://${AUTH_SERVICE_UPSTREAM};
  set $api_service http://${API_SERVICE_UPSTREAM};
  set $audit_service http://${AUDIT_SERVICE_UPSTREAM};
  set $notification_service http://${NOTIFICATION_SERVICE_UPSTREAM};
  set $auth_prometheus http://${AUTH_SERVICE_UPSTREAM}/actuator/prometheus;
  set $api_prometheus http://${API_SERVICE_UPSTREAM}/actuator/prometheus;
  set $audit_prometheus http://${AUDIT_SERVICE_UPSTREAM}/actuator/prometheus;
  set $gateway_status http://${API_SERVICE_UPSTREAM}/api/dashboard-status;
  set $notification_status http://${NOTIFICATION_SERVICE_UPSTREAM}/twilio/status;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Access-Control-Allow-Origin "${FRONTEND_PUBLIC_ORIGIN}" always;
  add_header Access-Control-Allow-Credentials "true" always;
  add_header Vary "Origin" always;

  client_max_body_size 2m;
  client_body_timeout 10s;
  client_header_timeout 10s;
  send_timeout 30s;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;

  error_page 418 = @cors_preflight;

  if ($request_method = OPTIONS) {
    return 418;
  }

  location @cors_preflight {
    add_header Access-Control-Allow-Origin "${FRONTEND_PUBLIC_ORIGIN}" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Origin, X-Requested-With, X-XSRF-TOKEN" always;
    add_header Content-Length 0;
    add_header Content-Type "text/plain; charset=UTF-8";
    return 204;
  }

  location /auth/ {
    proxy_pass $auth_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass $api_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /audit/ {
    proxy_pass $audit_service;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /auth/actuator/prometheus {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    proxy_pass $auth_prometheus;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/actuator/prometheus {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    proxy_pass $api_prometheus;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /audit/actuator/prometheus {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    proxy_pass $audit_prometheus;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /gateway/health {
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /gateway/status {
    proxy_pass $gateway_status;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /notify/twilio/status {
    proxy_pass $notification_status;
    proxy_set_header Host $host;
    proxy_set_header Authorization $upstream_authorization;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = / {
    default_type application/json;
    return 404 '{"error":"not_found"}';
  }

  location / {
    default_type application/json;
    return 404 '{"error":"not_found"}';
  }
}
