name: Set up Docker Buildx (resilient)
description: Warm the BuildKit image with retries before initializing Docker Buildx.

inputs:
  buildkit_image:
    description: BuildKit image to warm before bootstrapping Buildx.
    required: false
    default: moby/buildkit:buildx-stable-1
  max_attempts:
    description: Number of pull attempts before failing.
    required: false
    default: "5"

runs:
  using: composite
  steps:
    - name: Warm BuildKit image
      shell: bash
      env:
        BUILDKIT_IMAGE: ${{ inputs.buildkit_image }}
        MAX_ATTEMPTS: ${{ inputs.max_attempts }}
      run: |
        set -euo pipefail

        for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
          if docker pull "${BUILDKIT_IMAGE}"; then
            exit 0
          fi

          if [[ "${attempt}" -eq "${MAX_ATTEMPTS}" ]]; then
            echo "::error::Failed to pull ${BUILDKIT_IMAGE} after ${MAX_ATTEMPTS} attempts."
            exit 1
          fi

          sleep_seconds=$((attempt * 10))
          echo "::warning::Retrying BuildKit image pull in ${sleep_seconds}s..."
          sleep "${sleep_seconds}"
        done

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      with:
        driver-opts: image=${{ inputs.buildkit_image }}
