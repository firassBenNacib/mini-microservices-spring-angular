name: Registry login
description: Authenticate to Docker Hub or Amazon ECR.

inputs:
  registry_provider:
    description: "Registry provider to use: dockerhub or ecr."
    required: true
  dockerhub_username:
    description: Docker Hub username.
    required: false
    default: ""
  dockerhub_token:
    description: Docker Hub token.
    required: false
    default: ""
  cloud_provider_region:
    description: Cloud provider region for ECR.
    required: false
    default: ""
  cloud_provider_role_to_assume:
    description: OIDC role ARN for ECR.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Normalize registry provider
      id: normalize
      shell: bash
      run: |
        set -euo pipefail
        provider="$(printf '%s' "${{ inputs.registry_provider }}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
        echo "provider=${provider}" >> "${GITHUB_OUTPUT}"

    - name: Log in to Docker Hub
      if: steps.normalize.outputs.provider == 'dockerhub'
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Configure cloud provider credentials
      if: steps.normalize.outputs.provider == 'ecr'
      uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
      with:
        role-to-assume: ${{ inputs.cloud_provider_role_to_assume }}
        aws-region: ${{ inputs.cloud_provider_region }}

    - name: Log in to Amazon ECR
      if: steps.normalize.outputs.provider == 'ecr'
      shell: bash
      run: |
        set -euo pipefail
        account_id="$(aws sts get-caller-identity --query Account --output text)"
        registry="${account_id}.dkr.ecr.${{ inputs.cloud_provider_region }}.amazonaws.com"
        aws ecr get-login-password --region "${{ inputs.cloud_provider_region }}" | \
          docker login --username AWS --password-stdin "${registry}"
