name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.ref || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gateway-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run compose-backed gateway integration checks
        run: make integration-test

      - name: Collect integration logs
        if: always()
        run: |
          mkdir -p integration-artifacts
          printf 'Integration workflow result: %s\n' "${{ job.status }}" \
            > integration-artifacts/summary.txt
          docker compose -f docker-compose.yml -f docker-compose.build.yml ps -a \
            > integration-artifacts/compose-ps.txt || true
          docker compose -f docker-compose.yml -f docker-compose.build.yml logs --no-color \
            > integration-artifacts/compose-logs.txt || true

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: integration-logs
          path: integration-artifacts
