name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  security-events: write

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency vulnerability scan
        id: trivy_vuln
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.58.1 \
            fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --no-progress \
            --exit-code 1 \
            --format sarif \
            --output trivy-dependencies.sarif \
            .

      - name: Upload dependency scan SARIF
        if: always() && hashFiles('trivy-dependencies.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: trivy-dependencies.sarif
          category: dependency-review

      - name: Fail if dependency scan detected high-risk vulnerabilities
        if: steps.trivy_vuln.outcome == 'failure'
        run: |
          echo "Dependency vulnerability scan detected one or more HIGH or CRITICAL issues."
          exit 1
