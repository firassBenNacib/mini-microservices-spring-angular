name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_frontend: ${{ steps.filter.outputs.run_frontend }}
      run_notification: ${{ steps.filter.outputs.run_notification }}
      run_java: ${{ steps.filter.outputs.run_java }}
      run_images: ${{ steps.filter.outputs.run_images }}
      java_matrix: ${{ steps.filter.outputs.java_matrix }}
      image_matrix: ${{ steps.filter.outputs.image_matrix }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed areas
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        run: |
          python3 <<'PY'
          import fnmatch
          import json
          import os
          import subprocess

          ZERO = "0" * 40
          event = os.environ["EVENT_NAME"]
          before = os.environ.get("BEFORE_SHA", "")
          base = os.environ.get("BASE_SHA", "")
          head = os.environ["GITHUB_SHA"]

          if event == "pull_request":
            start = base
          elif before and before != ZERO:
            start = before
          else:
            start = ""

          if start:
            diff = subprocess.check_output(["git", "diff", "--name-only", start, head], text=True)
            files = [line for line in diff.splitlines() if line]
          else:
            files = ["__ALL__"]

          filters = {
            "workflow_config": [".github/actions/**", ".github/workflows/**"],
            "frontend": ["frontend/**"],
            "gateway": ["gateway/**"],
            "auth_service": ["backend/auth-service/**", "backend/pom.xml"],
            "api_service": ["backend/api-service/**", "backend/pom.xml"],
            "audit_service": ["backend/audit-service/**", "backend/pom.xml"],
            "mailer_service": ["backend/mailer-service/**", "backend/pom.xml"],
            "notification_service": ["backend/notification-service/**"],
          }

          def matches(patterns):
            if "__ALL__" in files:
              return True
            return any(fnmatch.fnmatch(path, pattern) for path in files for pattern in patterns)

          results = {name: matches(patterns) for name, patterns in filters.items()}
          java_entries = [
            {"service_dir": "backend/auth-service"},
            {"service_dir": "backend/api-service"},
            {"service_dir": "backend/audit-service"},
            {"service_dir": "backend/mailer-service"},
          ]
          image_entries = [
            {"image_name": "auth-service", "context": "backend/auth-service"},
            {"image_name": "api-service", "context": "backend/api-service"},
            {"image_name": "audit-service", "context": "backend/audit-service"},
            {"image_name": "mailer-service", "context": "backend/mailer-service"},
            {"image_name": "notification-service", "context": "backend/notification-service"},
            {"image_name": "gateway", "context": "gateway"},
            {"image_name": "frontend", "context": "frontend"},
          ]

          selected_java = [
            entry for entry in java_entries
            if results["workflow_config"] or results[entry["service_dir"].split("/")[-1].replace("-", "_")]
          ]
          selected_images = [
            entry for entry in image_entries
            if results["workflow_config"] or (
              entry["image_name"] == "frontend" and results["frontend"]
            ) or (
              entry["image_name"] == "gateway" and results["gateway"]
            ) or (
              entry["image_name"] == "auth-service" and results["auth_service"]
            ) or (
              entry["image_name"] == "api-service" and results["api_service"]
            ) or (
              entry["image_name"] == "audit-service" and results["audit_service"]
            ) or (
              entry["image_name"] == "mailer-service" and results["mailer_service"]
            ) or (
              entry["image_name"] == "notification-service" and results["notification_service"]
            )
          ]

          outputs = {
            "run_frontend": results["workflow_config"] or results["frontend"],
            "run_notification": results["workflow_config"] or results["notification_service"],
            "run_java": bool(selected_java),
            "run_images": bool(selected_images),
            "java_matrix": json.dumps(selected_java),
            "image_matrix": json.dumps(selected_images),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            for name in ("run_frontend", "run_notification", "run_java", "run_images"):
              fh.write(f"{name}={'true' if outputs[name] else 'false'}\n")
            fh.write(f"java_matrix={outputs['java_matrix']}\n")
            fh.write(f"image_matrix={outputs['image_matrix']}\n")
          PY

  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.7

  dockerfile-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Lint Dockerfiles
        run: |
          mapfile -t dockerfiles < <(rg --files | rg '(^|/)(Dockerfile|[^/]+\.Dockerfile)$')
          if [[ "${#dockerfiles[@]}" -eq 0 ]]; then
            exit 0
          fi
          for file in "${dockerfiles[@]}"; do
            docker run --rm -i hadolint/hadolint:v2.12.0 < "${file}"
          done

  shell-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Lint shell scripts
        run: |
          mapfile -t shell_files < <(rg --files | rg '\.sh$')
          if [[ "${#shell_files[@]}" -eq 0 ]]; then
            exit 0
          fi
          docker run --rm -v "${PWD}:/repo" -w /repo koalaman/shellcheck-alpine:v0.10.0 \
            shellcheck -x "${shell_files[@]}"

  compose-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate compose overlays
        run: make compose-validate

  frontend-build:
    needs:
      - changes
    if: needs.changes.outputs.run_frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up frontend workspace
        uses: ./.github/actions/setup-node-project
        with:
          working_directory: frontend

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  java-services:
    needs:
      - changes
    if: needs.changes.outputs.run_java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.java_matrix) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify service build
        working-directory: ${{ matrix.service_dir }}
        run: mvn -B -ntp verify

  notification-service:
    needs:
      - changes
    if: needs.changes.outputs.run_notification == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/notification-service/requirements.txt

      - name: Install notification dependencies
        working-directory: backend/notification-service
        run: pip install -r requirements.txt

      - name: Compile notification service
        working-directory: backend/notification-service
        run: python -m compileall main.py

      - name: Run notification service tests
        working-directory: backend/notification-service
        run: python -m unittest discover -s tests -p 'test_*.py'

  image-builds:
    needs:
      - changes
    if: needs.changes.outputs.run_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.image_matrix) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build container image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: false
          provenance: false
          tags: local/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  ci-status:
    name: CI
    if: always()
    needs:
      - workflow-lint
      - dockerfile-lint
      - shell-lint
      - compose-validate
      - changes
      - frontend-build
      - java-services
      - notification-service
      - image-builds
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          WORKFLOW_LINT: ${{ needs.workflow-lint.result }}
          DOCKERFILE_LINT: ${{ needs.dockerfile-lint.result }}
          SHELL_LINT: ${{ needs.shell-lint.result }}
          COMPOSE_VALIDATE: ${{ needs.compose-validate.result }}
          FRONTEND_BUILD: ${{ needs.frontend-build.result }}
          JAVA_SERVICES: ${{ needs.java-services.result }}
          NOTIFICATION_SERVICE: ${{ needs.notification-service.result }}
          IMAGE_BUILDS: ${{ needs.image-builds.result }}
        run: |
          for result in \
            "${WORKFLOW_LINT}" \
            "${DOCKERFILE_LINT}" \
            "${SHELL_LINT}" \
            "${COMPOSE_VALIDATE}" \
            "${FRONTEND_BUILD}" \
            "${JAVA_SERVICES}" \
            "${NOTIFICATION_SERVICE}" \
            "${IMAGE_BUILDS}"; do
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "::error::CI dependency failed with result ${result}."
              exit 1
            fi
          done
