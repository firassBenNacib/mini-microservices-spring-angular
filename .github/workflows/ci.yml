name: CI

on:
  workflow_dispatch:
    inputs:
      sonarqube_provider:
        description: SonarQube provider
        required: false
        type: choice
        default: disabled
        options:
          - disabled
          - cloud_quality_gate
          - server_quality_gate
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_frontend: ${{ steps.filter.outputs.run_frontend }}
      run_notification: ${{ steps.filter.outputs.run_notification }}
      run_java: ${{ steps.filter.outputs.run_java }}
      run_images: ${{ steps.filter.outputs.run_images }}
      run_integration: ${{ steps.filter.outputs.run_integration }}
      java_matrix: ${{ steps.filter.outputs.java_matrix }}
      image_matrix: ${{ steps.filter.outputs.image_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed areas
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        run: |
          python3 <<'PY'
          import fnmatch
          import json
          import os
          import subprocess

          ZERO = "0" * 40
          event = os.environ["EVENT_NAME"]
          before = os.environ.get("BEFORE_SHA", "")
          base = os.environ.get("BASE_SHA", "")
          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()

          def commit_exists(ref):
            if not ref:
              return False
            return subprocess.run(
              ["git", "rev-parse", "--verify", "--quiet", f"{ref}^{{commit}}"],
              stdout=subprocess.DEVNULL,
              stderr=subprocess.DEVNULL,
              check=False,
            ).returncode == 0

          if event == "pull_request" and commit_exists(base):
            start = base
          elif before and before != ZERO and commit_exists(before):
            start = before
          else:
            start = ""

          if start:
            diff = subprocess.check_output(["git", "diff", "--name-only", start, head], text=True)
            files = [line for line in diff.splitlines() if line]
          else:
            files = ["__ALL__"]

          filters = {
            "workflow_config": [".github/actions/**", ".github/workflows/**"],
            "frontend": ["frontend/**"],
            "gateway": ["gateway/**"],
            "auth_service": ["backend/auth-service/**", "backend/pom.xml"],
            "api_service": ["backend/api-service/**", "backend/pom.xml"],
            "audit_service": ["backend/audit-service/**", "backend/pom.xml"],
            "mailer_service": ["backend/mailer-service/**", "backend/pom.xml"],
            "notification_service": ["backend/notification-service/**"],
          }

          def matches(patterns):
            if "__ALL__" in files:
              return True
            return any(fnmatch.fnmatch(path, pattern) for path in files for pattern in patterns)

          results = {name: matches(patterns) for name, patterns in filters.items()}
          java_entries = [
            {"service_dir": "backend/auth-service"},
            {"service_dir": "backend/api-service"},
            {"service_dir": "backend/audit-service"},
            {"service_dir": "backend/mailer-service"},
          ]
          image_entries = [
            {"image_name": "auth-service", "context": "backend/auth-service"},
            {"image_name": "api-service", "context": "backend/api-service"},
            {"image_name": "audit-service", "context": "backend/audit-service"},
            {"image_name": "mailer-service", "context": "backend/mailer-service"},
            {"image_name": "notification-service", "context": "backend/notification-service"},
            {"image_name": "gateway", "context": "gateway"},
            {"image_name": "frontend", "context": "frontend"},
          ]

          selected_java = [
            entry for entry in java_entries
            if results["workflow_config"] or results[entry["service_dir"].split("/")[-1].replace("-", "_")]
          ]
          selected_images = [
            entry for entry in image_entries
            if results["workflow_config"] or (
              entry["image_name"] == "frontend" and results["frontend"]
            ) or (
              entry["image_name"] == "gateway" and results["gateway"]
            ) or (
              entry["image_name"] == "auth-service" and results["auth_service"]
            ) or (
              entry["image_name"] == "api-service" and results["api_service"]
            ) or (
              entry["image_name"] == "audit-service" and results["audit_service"]
            ) or (
              entry["image_name"] == "mailer-service" and results["mailer_service"]
            ) or (
              entry["image_name"] == "notification-service" and results["notification_service"]
            )
          ]

          outputs = {
            "run_frontend": results["workflow_config"] or results["frontend"],
            "run_notification": results["workflow_config"] or results["notification_service"],
            "run_java": bool(selected_java),
            "run_images": bool(selected_images),
            "run_integration": results["workflow_config"] or results["frontend"] or results["gateway"] or results["auth_service"] or results["api_service"] or results["audit_service"] or results["mailer_service"] or results["notification_service"],
            "java_matrix": json.dumps(selected_java),
            "image_matrix": json.dumps(selected_images),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            for name in ("run_frontend", "run_notification", "run_java", "run_images", "run_integration"):
              fh.write(f"{name}={'true' if outputs[name] else 'false'}\n")
            fh.write(f"java_matrix={outputs['java_matrix']}\n")
            fh.write(f"image_matrix={outputs['image_matrix']}\n")
          PY

  resolve-sonarqube:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      provider: ${{ steps.resolve.outputs.provider }}
      enabled: ${{ steps.resolve.outputs.enabled }}
    steps:
      - name: Resolve SonarQube provider
        id: resolve
        env:
          INPUT_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && inputs.sonarqube_provider || '' }}
          VAR_PROVIDER: ${{ vars.SONARQUBE_PROVIDER || '' }}
        run: |
          provider="${INPUT_PROVIDER:-${VAR_PROVIDER:-disabled}}"
          case "${provider}" in
            disabled|cloud_quality_gate|server_quality_gate) ;;
            *)
              echo "::error::Unsupported SonarQube provider '${provider}'. Use disabled, cloud_quality_gate, or server_quality_gate."
              exit 1
              ;;
          esac

          if [[ "${provider}" == "disabled" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "provider=${provider}" >> "${GITHUB_OUTPUT}"

  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.7

  dockerfile-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false

      - name: Lint Dockerfiles
        run: |
          mapfile -t dockerfiles < <(rg --files | rg '(^|/)(Dockerfile|[^/]+\.Dockerfile)$')
          if [[ "${#dockerfiles[@]}" -eq 0 ]]; then
            exit 0
          fi
          for file in "${dockerfiles[@]}"; do
            docker run --rm -i hadolint/hadolint:v2.12.0 < "${file}"
          done

  shell-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false

      - name: Lint shell scripts
        run: |
          mapfile -t shell_files < <(rg --files | rg '\.sh$')
          if [[ "${#shell_files[@]}" -eq 0 ]]; then
            exit 0
          fi
          docker run --rm -v "${PWD}:/repo" -w /repo koalaman/shellcheck-alpine:v0.10.0 \
            shellcheck -x "${shell_files[@]}"

  compose-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false

      - name: Validate compose overlays
        run: make compose-validate

  frontend-build:
    needs:
      - changes
    if: needs.changes.outputs.run_frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false

      - name: Set up frontend workspace
        uses: ./.github/actions/setup-node-project
        with:
          working_directory: frontend

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-frontend
          path: frontend/coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  java-services:
    needs:
      - changes
    if: needs.changes.outputs.run_java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.java_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false

      - name: Select preinstalled JDK
        run: |
          echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> "${GITHUB_ENV}"
          echo "${JAVA_HOME_17_X64}/bin" >> "${GITHUB_PATH}"
          java -version

      - name: Derive service metadata
        id: service_meta
        env:
          SERVICE_DIR: ${{ matrix.service_dir }}
        run: |
          echo "service_name=${SERVICE_DIR##*/}" >> "${GITHUB_OUTPUT}"

      - name: Verify service build
        working-directory: ${{ matrix.service_dir }}
        run: mvn -B -ntp verify

      - name: Upload JaCoCo coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-${{ steps.service_meta.outputs.service_name }}
          path: ${{ matrix.service_dir }}/target/site/jacoco

  notification-service:
    needs:
      - changes
    if: needs.changes.outputs.run_notification == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/notification-service/requirements.txt

      - name: Install notification dependencies
        working-directory: backend/notification-service
        run: pip install -r requirements.txt

      - name: Compile notification service
        working-directory: backend/notification-service
        run: python -m compileall main.py

      - name: Run notification service tests
        working-directory: backend/notification-service
        run: python -m unittest discover -s tests -p 'test_*.py'

  image-builds:
    needs:
      - changes
    if: needs.changes.outputs.run_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.image_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Build container image
        run: |
          docker build \
            --tag "local/${{ matrix.image_name }}:${{ github.sha }}" \
            "${{ matrix.context }}"

  gateway-integration:
    needs:
      - changes
    if: needs.changes.outputs.run_integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Run gateway integration checks
        run: make integration-test

  sonarqube:
    needs:
      - changes
      - resolve-sonarqube
    if: needs.resolve-sonarqube.outputs.enabled == 'true' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.run_integration == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate SonarQube configuration
        env:
          SONAR_PROVIDER: ${{ needs.resolve-sonarqube.outputs.provider }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || '' }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || '' }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || '' }}
        run: |
          missing=()
          [[ -n "${SONAR_TOKEN}" ]] || missing+=("SONAR_TOKEN secret")
          [[ -n "${SONAR_PROJECT_KEY}" ]] || missing+=("SONAR_PROJECT_KEY variable")

          if [[ "${SONAR_PROVIDER}" == "cloud_quality_gate" ]]; then
            [[ -n "${SONAR_ORGANIZATION}" ]] || missing+=("SONAR_ORGANIZATION variable")
          fi
          if [[ "${SONAR_PROVIDER}" == "server_quality_gate" ]]; then
            [[ -n "${SONAR_HOST_URL}" ]] || missing+=("SONAR_HOST_URL variable")
          fi

          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing SonarQube configuration: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

      - name: Build SonarQube scan arguments
        id: sonar_args
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref || '' }}
          BASE_REF: ${{ github.base_ref || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          SONAR_PROVIDER: ${{ needs.resolve-sonarqube.outputs.provider }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || '' }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || '' }}
        run: |
          {
            echo "args<<EOF"
            if [[ "${SONAR_PROVIDER}" == "cloud_quality_gate" ]]; then
              echo "-Dsonar.organization=${SONAR_ORGANIZATION}"
            fi
            echo "-Dsonar.projectKey=${SONAR_PROJECT_KEY}"
            echo "-Dsonar.projectName=mini-microservices-spring-angular"
            echo "-Dsonar.scm.revision=${{ github.event.pull_request.head.sha || github.sha }}"
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              echo "-Dsonar.pullrequest.key=${PR_NUMBER}"
              echo "-Dsonar.pullrequest.branch=${HEAD_REF}"
              echo "-Dsonar.pullrequest.base=${BASE_REF}"
            else
              echo "-Dsonar.branch.name=${REF_NAME}"
            fi
            echo "-Dsonar.qualitygate.wait=true"
            echo "-Dsonar.qualitygate.timeout=600"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up frontend workspace
        uses: ./.github/actions/setup-node-project
        with:
          working_directory: frontend

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Select preinstalled JDK
        run: |
          echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> "${GITHUB_ENV}"
          echo "${JAVA_HOME_17_X64}/bin" >> "${GITHUB_PATH}"
          java -version

      - name: Verify auth-service
        working-directory: backend/auth-service
        run: mvn -B -ntp verify

      - name: Verify api-service
        working-directory: backend/api-service
        run: mvn -B -ntp verify

      - name: Verify audit-service
        working-directory: backend/audit-service
        run: mvn -B -ntp verify

      - name: Verify mailer-service
        working-directory: backend/mailer-service
        run: mvn -B -ntp verify

      - name: Copy Java dependencies for SonarQube
        working-directory: backend
        run: mvn -B -ntp -pl auth-service,api-service,audit-service,mailer-service -am dependency:copy-dependencies -DincludeScope=compile -DoutputDirectory=target/dependency

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/notification-service/requirements.txt

      - name: Run notification-service tests with coverage
        working-directory: backend/notification-service
        run: |
          python -m pip install -r requirements.txt coverage
          coverage run -m unittest discover -s tests -p 'test_*.py'
          coverage xml -o coverage.xml

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ needs.resolve-sonarqube.outputs.provider == 'cloud_quality_gate' && 'https://sonarcloud.io' || needs.resolve-sonarqube.outputs.provider == 'server_quality_gate' && vars.SONAR_HOST_URL || '' }}
          SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT || '' }}
        with:
          args: ${{ steps.sonar_args.outputs.args }}

  ci-status:
    name: CI
    if: always()
    needs:
      - workflow-lint
      - dockerfile-lint
      - shell-lint
      - compose-validate
      - changes
      - resolve-sonarqube
      - frontend-build
      - java-services
      - notification-service
      - image-builds
      - gateway-integration
      - sonarqube
    runs-on: ubuntu-latest
    steps:
      - name: Write CI summary
        env:
          CHANGES: ${{ needs.changes.result }}
          WORKFLOW_LINT: ${{ needs.workflow-lint.result }}
          DOCKERFILE_LINT: ${{ needs.dockerfile-lint.result }}
          SHELL_LINT: ${{ needs.shell-lint.result }}
          COMPOSE_VALIDATE: ${{ needs.compose-validate.result }}
          FRONTEND_BUILD: ${{ needs.frontend-build.result }}
          JAVA_SERVICES: ${{ needs.java-services.result }}
          NOTIFICATION_SERVICE: ${{ needs.notification-service.result }}
          IMAGE_BUILDS: ${{ needs.image-builds.result }}
          GATEWAY_INTEGRATION: ${{ needs.gateway-integration.result }}
          SONARQUBE: ${{ needs.sonarqube.result }}
          SONARQUBE_PROVIDER: ${{ needs.resolve-sonarqube.outputs.provider }}
          RUN_FRONTEND: ${{ needs.changes.outputs.run_frontend }}
          RUN_NOTIFICATION: ${{ needs.changes.outputs.run_notification }}
          RUN_JAVA: ${{ needs.changes.outputs.run_java }}
          RUN_IMAGES: ${{ needs.changes.outputs.run_images }}
          RUN_INTEGRATION: ${{ needs.changes.outputs.run_integration }}
        run: |
          {
            echo "## CI summary"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| changes | ${CHANGES} |"
            echo "| workflow-lint | ${WORKFLOW_LINT} |"
            echo "| dockerfile-lint | ${DOCKERFILE_LINT} |"
            echo "| shell-lint | ${SHELL_LINT} |"
            echo "| compose-validate | ${COMPOSE_VALIDATE} |"
            echo "| frontend-build | ${FRONTEND_BUILD} |"
            echo "| java-services | ${JAVA_SERVICES} |"
            echo "| notification-service | ${NOTIFICATION_SERVICE} |"
            echo "| image-builds | ${IMAGE_BUILDS} |"
            echo "| gateway-integration | ${GATEWAY_INTEGRATION} |"
            echo "| sonarqube | ${SONARQUBE} |"
            echo
            echo "### Path detection"
            echo "- frontend: ${RUN_FRONTEND}"
            echo "- notification-service: ${RUN_NOTIFICATION}"
            echo "- java-services: ${RUN_JAVA}"
            echo "- image-builds: ${RUN_IMAGES}"
            echo "- gateway-integration: ${RUN_INTEGRATION}"
            echo
            echo "### SonarQube"
            echo "- provider: ${SONARQUBE_PROVIDER}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Check upstream job results
        env:
          CHANGES: ${{ needs.changes.result }}
          WORKFLOW_LINT: ${{ needs.workflow-lint.result }}
          DOCKERFILE_LINT: ${{ needs.dockerfile-lint.result }}
          SHELL_LINT: ${{ needs.shell-lint.result }}
          COMPOSE_VALIDATE: ${{ needs.compose-validate.result }}
          FRONTEND_BUILD: ${{ needs.frontend-build.result }}
          JAVA_SERVICES: ${{ needs.java-services.result }}
          NOTIFICATION_SERVICE: ${{ needs.notification-service.result }}
          IMAGE_BUILDS: ${{ needs.image-builds.result }}
          GATEWAY_INTEGRATION: ${{ needs.gateway-integration.result }}
          SONARQUBE: ${{ needs.sonarqube.result }}
        run: |
          if [[ "${CHANGES}" != "success" ]]; then
            echo "::error::CI change detection failed with result ${CHANGES}."
            exit 1
          fi
          for result in \
            "${WORKFLOW_LINT}" \
            "${DOCKERFILE_LINT}" \
            "${SHELL_LINT}" \
            "${COMPOSE_VALIDATE}" \
            "${FRONTEND_BUILD}" \
            "${JAVA_SERVICES}" \
            "${NOTIFICATION_SERVICE}" \
            "${IMAGE_BUILDS}" \
            "${GATEWAY_INTEGRATION}" \
            "${SONARQUBE}"; do
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "::error::CI dependency failed with result ${result}."
              exit 1
            fi
          done
