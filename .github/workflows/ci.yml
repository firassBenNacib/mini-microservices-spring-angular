name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.7

  dockerfile-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Lint Dockerfiles
        run: |
          mapfile -t dockerfiles < <(rg --files | rg '(^|/)(Dockerfile|[^/]+\.Dockerfile)$')
          if [[ "${#dockerfiles[@]}" -eq 0 ]]; then
            exit 0
          fi
          for file in "${dockerfiles[@]}"; do
            docker run --rm -i hadolint/hadolint:v2.12.0 < "${file}"
          done

  shell-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Lint shell scripts
        run: |
          mapfile -t shell_files < <(rg --files | rg '\.sh$')
          if [[ "${#shell_files[@]}" -eq 0 ]]; then
            exit 0
          fi
          docker run --rm -v "${PWD}:/repo" -w /repo koalaman/shellcheck-alpine:v0.10.0 \
            shellcheck -x "${shell_files[@]}"

  compose-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate compose overlays
        run: make compose-validate

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up frontend workspace
        uses: ./.github/actions/setup-node-project
        with:
          working_directory: frontend

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  java-services:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service_dir:
          - backend/auth-service
          - backend/api-service
          - backend/audit-service
          - backend/mailer-service
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify service build
        working-directory: ${{ matrix.service_dir }}
        run: mvn -B -ntp verify

  notification-service:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/notification-service/requirements.txt

      - name: Install notification dependencies
        working-directory: backend/notification-service
        run: pip install -r requirements.txt

      - name: Compile notification service
        working-directory: backend/notification-service
        run: python -m compileall main.py

      - name: Run notification service tests
        working-directory: backend/notification-service
        run: python -m unittest discover -s tests -p 'test_*.py'

  image-builds:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auth-service
            context: backend/auth-service
          - image_name: api-service
            context: backend/api-service
          - image_name: audit-service
            context: backend/audit-service
          - image_name: mailer-service
            context: backend/mailer-service
          - image_name: notification-service
            context: backend/notification-service
          - image_name: gateway
            context: gateway
          - image_name: frontend
            context: frontend
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build container image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: false
          provenance: false
          tags: local/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  ci-status:
    name: CI
    if: always()
    needs:
      - workflow-lint
      - dockerfile-lint
      - shell-lint
      - compose-validate
      - frontend-build
      - java-services
      - notification-service
      - image-builds
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          WORKFLOW_LINT: ${{ needs.workflow-lint.result }}
          DOCKERFILE_LINT: ${{ needs.dockerfile-lint.result }}
          SHELL_LINT: ${{ needs.shell-lint.result }}
          COMPOSE_VALIDATE: ${{ needs.compose-validate.result }}
          FRONTEND_BUILD: ${{ needs.frontend-build.result }}
          JAVA_SERVICES: ${{ needs.java-services.result }}
          NOTIFICATION_SERVICE: ${{ needs.notification-service.result }}
          IMAGE_BUILDS: ${{ needs.image-builds.result }}
        run: |
          for result in \
            "${WORKFLOW_LINT}" \
            "${DOCKERFILE_LINT}" \
            "${SHELL_LINT}" \
            "${COMPOSE_VALIDATE}" \
            "${FRONTEND_BUILD}" \
            "${JAVA_SERVICES}" \
            "${NOTIFICATION_SERVICE}" \
            "${IMAGE_BUILDS}"; do
            if [[ "${result}" != "success" ]]; then
              echo "::error::CI dependency failed with result ${result}."
              exit 1
            fi
          done
