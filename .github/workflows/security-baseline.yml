name: Security Baseline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-baseline-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks against git history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  trivy-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy secret scan
        id: trivy_secrets
        continue-on-error: true
        run: |
          trivy fs \
            --scanners secret \
            --format sarif \
            --output trivy-secrets.sarif \
            --exit-code 1 \
            --quiet \
            .

      - name: Upload Trivy secrets SARIF
        if: always() && hashFiles('trivy-secrets.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Fail if Trivy detected secrets
        if: steps.trivy_secrets.outcome == 'failure'
        run: |
          echo "Trivy detected one or more secrets."
          exit 1

  trivy-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy config scan
        id: trivy_config
        continue-on-error: true
        run: |
          trivy config \
            --format sarif \
            --output trivy-config.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --quiet \
            .

      - name: Upload Trivy config SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Fail if Trivy detected high-risk misconfiguration
        if: steps.trivy_config.outcome == 'failure'
        run: |
          echo "Trivy detected one or more high-risk misconfigurations."
          exit 1

  security-baseline-status:
    name: Security Baseline
    if: always()
    needs:
      - gitleaks
      - trivy-secrets
      - trivy-config
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          GITLEAKS: ${{ needs.gitleaks.result }}
          TRIVY_SECRETS: ${{ needs.trivy-secrets.result }}
          TRIVY_CONFIG: ${{ needs.trivy-config.result }}
        run: |
          for result in "${GITLEAKS}" "${TRIVY_SECRETS}" "${TRIVY_CONFIG}"; do
            if [[ "${result}" != "success" ]]; then
              echo "::error::Security Baseline dependency failed with result ${result}."
              exit 1
            fi
          done
