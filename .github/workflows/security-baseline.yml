name: Security Baseline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-baseline-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks against git history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Trivy secret scan
        id: trivy_secrets
        continue-on-error: true
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # 0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: sarif
          output: trivy-secrets.sarif
          exit-code: "1"
          hide-progress: true

      - name: Upload Trivy secrets SARIF
        if: always() && hashFiles('trivy-secrets.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Fail if Trivy detected secrets
        if: steps.trivy_secrets.outcome == 'failure'
        run: |
          echo "Trivy detected one or more secrets."
          exit 1

  trivy-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Trivy config scan
        id: trivy_config
        continue-on-error: true
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # 0.24.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          hide-progress: true

      - name: Upload Trivy config SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Fail if Trivy detected high-risk misconfiguration
        if: steps.trivy_config.outcome == 'failure'
        run: |
          echo "Trivy detected one or more high-risk misconfigurations."
          exit 1

  security-baseline-status:
    name: Security Baseline
    if: always()
    needs:
      - gitleaks
      - trivy-secrets
      - trivy-config
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          GITLEAKS: ${{ needs.gitleaks.result }}
          TRIVY_SECRETS: ${{ needs.trivy-secrets.result }}
          TRIVY_CONFIG: ${{ needs.trivy-config.result }}
        run: |
          for result in "${GITLEAKS}" "${TRIVY_SECRETS}" "${TRIVY_CONFIG}"; do
            if [[ "${result}" != "success" ]]; then
              echo "::error::Security Baseline dependency failed with result ${result}."
              exit 1
            fi
          done
