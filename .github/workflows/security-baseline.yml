name: Security Baseline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-baseline-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GITLEAKS_VERSION: v8.30.0
  TRIVY_VERSION: v0.69.3

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_x64.tar.gz" -o "$tmp/gitleaks.tar.gz"
          tar -xzf "$tmp/gitleaks.tar.gz" -C "$tmp"
          install "$tmp/gitleaks" /usr/local/bin/gitleaks

      - name: Run Gitleaks against git history
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks git . \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact

      - name: Upload Gitleaks report
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

      - name: Fail if Gitleaks detected secrets
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks detected one or more secrets."
          exit 1

  trivy-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Trivy
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz" -o "$tmp/trivy.tar.gz"
          tar -xzf "$tmp/trivy.tar.gz" -C "$tmp"
          install "$tmp/trivy" /usr/local/bin/trivy

      - name: Trivy secret scan
        id: trivy_secrets
        continue-on-error: true
        run: |
          trivy fs . \
            --scanners secret \
            --format sarif \
            --output trivy-secrets.sarif \
            --exit-code 1 \
            --quiet

      - name: Upload Trivy secrets SARIF
        if: always() && hashFiles('trivy-secrets.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: trivy-secrets.sarif
          category: trivy-secrets

      - name: Fail if Trivy detected secrets
        if: steps.trivy_secrets.outcome == 'failure'
        run: |
          echo "Trivy detected one or more secrets."
          exit 1

  trivy-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Trivy
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz" -o "$tmp/trivy.tar.gz"
          tar -xzf "$tmp/trivy.tar.gz" -C "$tmp"
          install "$tmp/trivy" /usr/local/bin/trivy

      - name: Trivy config scan
        id: trivy_config
        continue-on-error: true
        run: |
          trivy config . \
            --format sarif \
            --output trivy-config.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --quiet

      - name: Upload Trivy config SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Fail if Trivy detected high-risk misconfiguration
        if: steps.trivy_config.outcome == 'failure'
        run: |
          echo "Trivy detected one or more high-risk misconfigurations."
          exit 1

  security-baseline-status:
    name: Security Baseline
    if: always()
    needs:
      - gitleaks
      - trivy-secrets
      - trivy-config
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        env:
          GITLEAKS: ${{ needs.gitleaks.result }}
          TRIVY_SECRETS: ${{ needs.trivy-secrets.result }}
          TRIVY_CONFIG: ${{ needs.trivy-config.result }}
        run: |
          for result in "${GITLEAKS}" "${TRIVY_SECRETS}" "${TRIVY_CONFIG}"; do
            if [[ "${result}" != "success" ]]; then
              echo "::error::Security Baseline dependency failed with result ${result}."
              exit 1
            fi
          done
