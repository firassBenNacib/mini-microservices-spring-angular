name: DockerHub Publish

on:
  workflow_dispatch:
    inputs:
      dockerhub_username:
        description: DockerHub login username
        required: true
        type: string
      dockerhub_namespace:
        description: DockerHub namespace or org
        required: true
        type: string
      image_tag:
        description: Image tag to push
        required: true
        type: string
      push_latest:
        description: Also push the latest tag
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      dockerhub_username:
        required: true
        type: string
      dockerhub_namespace:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      push_latest:
        required: false
        default: false
        type: boolean
    secrets:
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: mini-spring-auth
            context: backend/auth-service
          - image_name: mini-spring-api
            context: backend/api-service
          - image_name: mini-spring-audit
            context: backend/audit-service
          - image_name: mini-spring-mailer
            context: backend/mailer-service
          - image_name: mini-spring-notification
            context: backend/notification-service
          - image_name: mini-spring-frontend
            context: frontend
          - image_name: mini-spring-gateway
            context: gateway

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to DockerHub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          tags="${{ inputs.dockerhub_namespace }}/${{ matrix.image_name }}:${{ inputs.image_tag }}"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            tags="${tags},${{ inputs.dockerhub_namespace }}/${{ matrix.image_name }}:latest"
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
