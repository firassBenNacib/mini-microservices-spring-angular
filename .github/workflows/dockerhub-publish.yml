name: DockerHub Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    uses: ./.github/workflows/_publish-images.yml
    with:
      registry_provider: dockerhub
      dockerhub_username: ${{ vars.DOCKERHUB_USERNAME }}
      dockerhub_namespace: ${{ vars.DOCKERHUB_NAMESPACE != '' && vars.DOCKERHUB_NAMESPACE || vars.DOCKERHUB_USERNAME }}
      image_tag: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
      push_latest: ${{ github.ref_type == 'tag' }}
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
