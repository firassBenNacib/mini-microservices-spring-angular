name: DAST

on:
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: GitHub environment to load vars from
        required: false
        default: nonprod
        type: choice
        options:
          - nonprod
          - production
      target_url:
        description: Optional override for the scan target URL
        required: false
        type: string
      enable_nuclei:
        description: Run Nuclei alongside ZAP
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

concurrency:
  group: dast-${{ github.ref || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-target:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.deployment_environment || 'nonprod' }}
    outputs:
      target_url: ${{ steps.validate.outputs.target_url }}
      enable_nuclei: ${{ steps.validate.outputs.enable_nuclei }}
    env:
      DAST_TARGET_URL: ${{ inputs.target_url != '' && inputs.target_url || vars.DAST_TARGET_URL }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Validate DAST target
        id: validate
        run: |
          test -n "${DAST_TARGET_URL}" || {
            echo "::error::Set repository variable DAST_TARGET_URL or provide workflow_dispatch input target_url."
            exit 1
          }
          echo "target_url=${DAST_TARGET_URL}" >> "${GITHUB_OUTPUT}"
          echo "enable_nuclei=${{ inputs.enable_nuclei }}" >> "${GITHUB_OUTPUT}"

  zap-baseline:
    needs: validate-target
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Run OWASP ZAP baseline
        id: zap_baseline
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ needs.validate-target.outputs.target_url }}
          allow_issue_writing: false
          fail_action: false
          cmd_options: "-a"

      - name: Fail if ZAP found fail-level alerts
        run: |
          report_file="report_md.md"
          if [[ ! -f "${report_file}" ]]; then
            echo "::error::Expected ZAP report ${report_file} was not generated."
            exit 1
          fi

          summary_line="$(grep -E 'FAIL-NEW:|FAIL-INPROG:' "${report_file}" | tail -n 1 || true)"
          if [[ -z "${summary_line}" ]]; then
            exit 0
          fi

          fail_new="$(sed -n 's/.*FAIL-NEW:[[:space:]]*\([0-9][0-9]*\).*/\1/p' <<< "${summary_line}")"
          fail_inprog="$(sed -n 's/.*FAIL-INPROG:[[:space:]]*\([0-9][0-9]*\).*/\1/p' <<< "${summary_line}")"
          fail_new="${fail_new:-0}"
          fail_inprog="${fail_inprog:-0}"

          if (( fail_new > 0 || fail_inprog > 0 )); then
            echo "::error::ZAP reported fail-level alerts. ${summary_line}"
            exit 1
          fi

  nuclei:
    if: ${{ needs.validate-target.outputs.enable_nuclei == 'true' }}
    needs: validate-target
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Install Nuclei CLI
        run: |
          nuclei_version="3.7.1"
          archive="nuclei_${nuclei_version}_linux_amd64.zip"
          curl -fsSL -o "${archive}" "https://github.com/projectdiscovery/nuclei/releases/download/v${nuclei_version}/${archive}"
          unzip -q "${archive}" nuclei
          install -m 0755 nuclei /usr/local/bin/nuclei

      - name: Run Nuclei
        run: |
          nuclei \
            -u "${{ needs.validate-target.outputs.target_url }}" \
            -severity high,critical \
            -rate-limit 10 \
            -timeout 10 \
            -retries 1 \
            -no-interactsh \
            -sarif-export nuclei.sarif

      - name: Upload Nuclei SARIF
        if: always() && hashFiles('nuclei.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: nuclei.sarif
          category: nuclei

      - name: Fail if Nuclei found issues
        if: always() && hashFiles('nuclei.sarif') != ''
        run: |
          findings_count="$(jq '[.runs[]?.results[]?] | length' nuclei.sarif)"
          if [[ "${findings_count}" -gt 0 ]]; then
            echo "::error::Nuclei detected ${findings_count} finding(s)."
            exit 1
          fi
