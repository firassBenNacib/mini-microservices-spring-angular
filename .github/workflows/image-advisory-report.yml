name: Image Advisory Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

concurrency:
  group: image-advisory-report-${{ github.ref || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  image-advisory-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auth-service
            context: backend/auth-service
          - image_name: api-service
            context: backend/api-service
          - image_name: audit-service
            context: backend/audit-service
          - image_name: mailer-service
            context: backend/mailer-service
          - image_name: notification-service
            context: backend/notification-service
          - image_name: gateway
            context: gateway
          - image_name: frontend
            context: frontend
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build local advisory image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          provenance: false
          tags: advisory/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=advisory-${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=advisory-${{ matrix.image_name }}

      - name: Run Grype advisory scan
        id: grype
        continue-on-error: true
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: advisory/${{ matrix.image_name }}:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: table
          output-file: advisory-${{ matrix.image_name }}.txt
          cache-db: true
          only-fixed: true

      - name: Upload advisory report
        if: always() && hashFiles(format('advisory-{0}.txt', matrix.image_name)) != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: advisory-${{ matrix.image_name }}
          path: advisory-${{ matrix.image_name }}.txt

      - name: Fail scheduled advisory if high or critical findings exist
        if: steps.grype.outcome == 'failure'
        run: |
          echo "::error::Grype found one or more fixed HIGH/CRITICAL vulnerabilities in ${{ matrix.image_name }}."
          exit 1
