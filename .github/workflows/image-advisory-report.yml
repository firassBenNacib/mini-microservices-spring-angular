name: Image Advisory Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

concurrency:
  group: image-advisory-report-${{ github.ref || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  image-advisory-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auth-service
            context: backend/auth-service
          - image_name: api-service
            context: backend/api-service
          - image_name: audit-service
            context: backend/audit-service
          - image_name: mailer-service
            context: backend/mailer-service
          - image_name: notification-service
            context: backend/notification-service
          - image_name: gateway
            context: gateway
          - image_name: frontend
            context: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build local advisory image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          provenance: false
          tags: advisory/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=advisory-${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=advisory-${{ matrix.image_name }}

      - name: Run Grype advisory scan
        id: grype
        continue-on-error: true
        uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c # v7.3.2
        with:
          image: advisory/${{ matrix.image_name }}:${{ github.sha }}
          fail-build: true
          only-fixed: true
          severity-cutoff: high
          output-format: table
          output-file: advisory-${{ matrix.image_name }}.txt

      - name: Upload advisory report
        if: always() && hashFiles(format('advisory-{0}.txt', matrix.image_name)) != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: advisory-${{ matrix.image_name }}
          path: advisory-${{ matrix.image_name }}.txt

      - name: Write advisory summary
        if: always()
        env:
          GRYPE_OUTCOME: ${{ steps.grype.outcome }}
        run: |
          {
            echo "## Image advisory summary"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| image | \`${{ matrix.image_name }}\` |"
            echo "| context | \`${{ matrix.context }}\` |"
            echo "| advisory scan outcome | ${GRYPE_OUTCOME} |"
            echo "| artifact | \`advisory-${{ matrix.image_name }}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Fail scheduled advisory if high or critical findings exist
        if: steps.grype.outcome == 'failure'
        run: |
          echo "::error::Grype found one or more fixed HIGH/CRITICAL vulnerabilities in ${{ matrix.image_name }}."
          exit 1
