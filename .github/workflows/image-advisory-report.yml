name: Image Advisory Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

concurrency:
  group: image-advisory-report-${{ github.ref || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  image-advisory-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auth-service
            context: backend/auth-service
          - image_name: api-service
            context: backend/api-service
          - image_name: audit-service
            context: backend/audit-service
          - image_name: mailer-service
            context: backend/mailer-service
          - image_name: notification-service
            context: backend/notification-service
          - image_name: gateway
            context: gateway
          - image_name: frontend
            context: frontend
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-buildx-resilient

      - name: Build local advisory image
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          provenance: false
          tags: advisory/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=advisory-${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=advisory-${{ matrix.image_name }}

      - name: Run Grype advisory scan
        id: grype
        continue-on-error: true
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: advisory/${{ matrix.image_name }}:${{ github.sha }}
          fail-build: true
          only-fixed: true
          severity-cutoff: high
          output-format: table
          output-file: advisory-${{ matrix.image_name }}.txt

      - name: Upload advisory report
        if: always() && hashFiles(format('advisory-{0}.txt', matrix.image_name)) != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: advisory-${{ matrix.image_name }}
          path: advisory-${{ matrix.image_name }}.txt

      - name: Fail scheduled advisory if high or critical findings exist
        if: steps.grype.outcome == 'failure'
        run: |
          echo "::error::Grype found one or more fixed HIGH/CRITICAL vulnerabilities in ${{ matrix.image_name }}."
          exit 1
