name: Image Advisory Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

concurrency:
  group: image-advisory-report-${{ github.ref || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  GRYPE_VERSION: v0.109.1

jobs:
  image-advisory-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auth-service
            context: backend/auth-service
          - image_name: api-service
            context: backend/api-service
          - image_name: audit-service
            context: backend/audit-service
          - image_name: mailer-service
            context: backend/mailer-service
          - image_name: notification-service
            context: backend/notification-service
          - image_name: gateway
            context: gateway
          - image_name: frontend
            context: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build local advisory image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          provenance: false
          tags: advisory/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=advisory-${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=advisory-${{ matrix.image_name }}

      - name: Install Grype
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${GRYPE_VERSION#v}_linux_amd64.tar.gz" -o "$tmp/grype.tar.gz"
          tar -xzf "$tmp/grype.tar.gz" -C "$tmp"
          install "$tmp/grype" /usr/local/bin/grype

      - name: Run Grype advisory scan
        id: grype
        continue-on-error: true
        run: |
          set -o pipefail
          grype "docker:advisory/${{ matrix.image_name }}:${{ github.sha }}" \
            --only-fixed \
            --fail-on high \
            -o table | tee "advisory-${{ matrix.image_name }}.txt"

      - name: Upload advisory report
        if: always() && hashFiles(format('advisory-{0}.txt', matrix.image_name)) != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: advisory-${{ matrix.image_name }}
          path: advisory-${{ matrix.image_name }}.txt

      - name: Fail scheduled advisory if high or critical findings exist
        if: steps.grype.outcome == 'failure'
        run: |
          echo "::error::Grype found one or more fixed HIGH/CRITICAL vulnerabilities in ${{ matrix.image_name }}."
          exit 1
