name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_codeql: ${{ steps.filter.outputs.run_codeql }}
      codeql_matrix: ${{ steps.filter.outputs.codeql_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed areas
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        run: |
          python3 <<'PY'
          import fnmatch
          import json
          import os
          import subprocess

          ZERO = "0" * 40
          event = os.environ["EVENT_NAME"]
          before = os.environ.get("BEFORE_SHA", "")
          base = os.environ.get("BASE_SHA", "")
          head = os.environ["GITHUB_SHA"]

          if event == "pull_request":
            start = base
          elif before and before != ZERO:
            start = before
          else:
            start = ""

          if start:
            diff = subprocess.check_output(["git", "diff", "--name-only", start, head], text=True)
            files = [line for line in diff.splitlines() if line]
          else:
            files = ["__ALL__"]

          filters = {
            "workflow_config": [".github/actions/**", ".github/workflows/**"],
            "frontend": ["frontend/**"],
            "notification_service": ["backend/notification-service/**"],
            "any_java": ["backend/auth-service/**", "backend/api-service/**", "backend/audit-service/**", "backend/mailer-service/**", "backend/pom.xml"],
          }

          def matches(patterns):
            if "__ALL__" in files:
              return True
            return any(fnmatch.fnmatch(path, pattern) for path in files for pattern in patterns)

          results = {name: matches(patterns) for name, patterns in filters.items()}
          codeql_entries = []
          if results["workflow_config"] or results["any_java"]:
            codeql_entries.append({"language": "java-kotlin"})
          if results["workflow_config"] or results["frontend"]:
            codeql_entries.append({"language": "javascript-typescript"})
          if results["workflow_config"] or results["notification_service"]:
            codeql_entries.append({"language": "python"})

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"run_codeql={'true' if codeql_entries else 'false'}\n")
            fh.write(f"codeql_matrix={json.dumps(codeql_entries)}\n")
          PY

  analyze:
    needs:
      - changes
    if: needs.changes.outputs.run_codeql == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.codeql_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Set up JDK
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Java services
        if: matrix.language == 'java-kotlin'
        run: mvn -B -ntp -f backend/pom.xml -DskipTests verify

      - name: Set up frontend workspace
        if: matrix.language == 'javascript-typescript'
        uses: ./.github/actions/setup-node-project
        with:
          working_directory: frontend

      - name: Build frontend for CodeQL
        if: matrix.language == 'javascript-typescript'
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/notification-service/requirements.txt

      - name: Install Python dependencies
        if: matrix.language == 'python'
        working-directory: backend/notification-service
        run: pip install -r requirements.txt

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          category: /language:${{ matrix.language }}

  codeql-status:
    name: CodeQL
    if: always()
    needs:
      - changes
      - analyze
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "::error::CodeQL change detection failed with result ${{ needs.changes.result }}."
            exit 1
          fi
          if [[ "${{ needs.analyze.result }}" != "success" && "${{ needs.analyze.result }}" != "skipped" ]]; then
            echo "::error::CodeQL dependency failed with result ${{ needs.analyze.result }}."
            exit 1
          fi
