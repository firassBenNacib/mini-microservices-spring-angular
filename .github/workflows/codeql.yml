name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
          - language: javascript-typescript
          - language: python
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Set up JDK
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Java services
        if: matrix.language == 'java-kotlin'
        run: mvn -B -ntp -f backend/pom.xml -DskipTests verify

      - name: Set up frontend workspace
        if: matrix.language == 'javascript-typescript'
        uses: ./.github/actions/setup-node-project
        with:
          working_directory: frontend

      - name: Build frontend for CodeQL
        if: matrix.language == 'javascript-typescript'
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/notification-service/requirements.txt

      - name: Install Python dependencies
        if: matrix.language == 'python'
        working-directory: backend/notification-service
        run: pip install -r requirements.txt

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          category: /language:${{ matrix.language }}

  codeql-status:
    name: CodeQL
    if: always()
    needs:
      - analyze
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        run: |
          if [[ "${{ needs.analyze.result }}" != "success" ]]; then
            echo "::error::CodeQL dependency failed with result ${{ needs.analyze.result }}."
            exit 1
          fi
