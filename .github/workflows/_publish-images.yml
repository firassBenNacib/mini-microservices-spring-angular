name: _Publish Images

on:
  workflow_call:
    inputs:
      registry_provider:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      push_latest:
        required: false
        type: boolean
        default: false
      dockerhub_username:
        required: false
        type: string
        default: ""
      dockerhub_namespace:
        required: false
        type: string
        default: ""
      cloud_provider_region:
        required: false
        type: string
        default: ""
      cloud_provider_role_to_assume:
        required: false
        type: string
        default: ""
      image_namespace:
        required: false
        type: string
        default: microservices
      sign_images:
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_TOKEN:
        required: false

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: publish-${{ inputs.registry_provider }}-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: auth-service
            context: backend/auth-service
            dockerhub_image_name: mini-spring-auth
            ecr_repo_name: auth-service
          - service_name: api-service
            context: backend/api-service
            dockerhub_image_name: mini-spring-api
            ecr_repo_name: api-service
          - service_name: audit-service
            context: backend/audit-service
            dockerhub_image_name: mini-spring-audit
            ecr_repo_name: audit-service
          - service_name: mailer-service
            context: backend/mailer-service
            dockerhub_image_name: mini-spring-mailer
            ecr_repo_name: mailer-service
          - service_name: notification-service
            context: backend/notification-service
            dockerhub_image_name: mini-spring-notification
            ecr_repo_name: notification-service
          - service_name: gateway
            context: gateway
            dockerhub_image_name: mini-spring-gateway
            ecr_repo_name: gateway
          - service_name: frontend
            context: frontend
            dockerhub_image_name: mini-spring-frontend
            ecr_repo_name: frontend
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate publish configuration
        run: |
          set -euo pipefail
          case "${{ inputs.registry_provider }}" in
            dockerhub)
              test -n "${{ inputs.dockerhub_username }}" || { echo "::error::Set repository variable DOCKERHUB_USERNAME."; exit 1; }
              test -n "${{ inputs.dockerhub_namespace }}" || { echo "::error::Set repository variable DOCKERHUB_NAMESPACE."; exit 1; }
              ;;
            ecr)
              test -n "${{ inputs.cloud_provider_region }}" || { echo "::error::Set repository variable CLOUD_PROVIDER_REGION."; exit 1; }
              test -n "${{ inputs.cloud_provider_role_to_assume }}" || { echo "::error::Set repository variable CLOUD_PROVIDER_ROLE_TO_ASSUME."; exit 1; }
              ;;
            *)
              echo "::error::Unsupported registry_provider '${{ inputs.registry_provider }}'."
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to registry
        uses: ./.github/actions/registry-login
        with:
          registry_provider: ${{ inputs.registry_provider }}
          dockerhub_username: ${{ inputs.dockerhub_username }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN || '' }}
          cloud_provider_region: ${{ inputs.cloud_provider_region }}
          cloud_provider_role_to_assume: ${{ inputs.cloud_provider_role_to_assume }}

      - name: Ensure ECR repository exists
        if: inputs.registry_provider == 'ecr'
        run: |
          repo_name="${{ inputs.image_namespace }}/${{ matrix.ecr_repo_name }}"
          aws ecr describe-repositories --region "${{ inputs.cloud_provider_region }}" --repository-names "${repo_name}" >/dev/null 2>&1 || \
            aws ecr create-repository --region "${{ inputs.cloud_provider_region }}" --repository-name "${repo_name}" >/dev/null

      - name: Compute image tags
        id: tags
        run: |
          set -euo pipefail
          if [[ "${{ inputs.registry_provider }}" == "dockerhub" ]]; then
            base="${{ inputs.dockerhub_namespace }}/${{ matrix.dockerhub_image_name }}"
          else
            account_id="$(aws sts get-caller-identity --query Account --output text)"
            base="${account_id}.dkr.ecr.${{ inputs.cloud_provider_region }}.amazonaws.com/${{ inputs.image_namespace }}/${{ matrix.ecr_repo_name }}"
          fi

          tags="${base}:${{ inputs.image_tag }}"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            tags="${tags},${base}:latest"
          fi

          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"
          echo "base_ref=${base}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        id: build_and_push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.context }}
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=publish-${{ matrix.service_name }}
          cache-to: type=gha,mode=max,scope=publish-${{ matrix.service_name }}

      - name: Build local release image for SBOM generation
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          provenance: false
          tags: local/release-${{ matrix.service_name }}:${{ github.sha }}
          cache-from: type=gha,scope=publish-${{ matrix.service_name }}

      - name: Generate release SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          image: local/release-${{ matrix.service_name }}:${{ github.sha }}
          format: spdx-json
          output-file: release-sbom-${{ matrix.service_name }}.spdx.json
          upload-artifact: "false"

      - name: Upload release SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-sbom-${{ matrix.service_name }}-${{ inputs.registry_provider }}
          path: release-sbom-${{ matrix.service_name }}.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275
        with:
          subject-name: ${{ steps.tags.outputs.base_ref }}
          subject-digest: ${{ steps.build_and_push.outputs.digest }}

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.tags.outputs.base_ref }}
          subject-digest: ${{ steps.build_and_push.outputs.digest }}
          sbom-path: release-sbom-${{ matrix.service_name }}.spdx.json

      - name: Install Cosign
        if: inputs.sign_images
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v3.10.0
        with:
          cosign-release: v3.0.5

      - name: Sign published image
        if: inputs.sign_images
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ steps.tags.outputs.base_ref }}@${{ steps.build_and_push.outputs.digest }}
        run: |
          set -euo pipefail
          test -n "${IMAGE_REF}" || {
            echo "::error::Published image digest is empty."
            exit 1
          }
          cosign sign --yes "${IMAGE_REF}"
