name: Container Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

permissions:
  contents: read

concurrency:
  group: container-security-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  image-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auth-service
            context: backend/auth-service
          - image_name: api-service
            context: backend/api-service
          - image_name: audit-service
            context: backend/audit-service
          - image_name: mailer-service
            context: backend/mailer-service
          - image_name: notification-service
            context: backend/notification-service
          - image_name: gateway
            context: gateway
          - image_name: frontend
            context: frontend
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Build local image
        run: |
          docker build \
            --pull \
            --tag "local/${{ matrix.image_name }}:${{ github.sha }}" \
            "${{ matrix.context }}"

      - name: Generate image SBOM
        uses: anchore/sbom-action@da167eac915b4e86f08b264dbdbc867b61be6f0c # v0.20.5
        with:
          image: local/${{ matrix.image_name }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.image_name }}.spdx.json
          upload-artifact: "false"

      - name: Upload image SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ matrix.image_name }}
          path: sbom-${{ matrix.image_name }}.spdx.json

      - name: Scan image with Grype
        id: grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: local/${{ matrix.image_name }}:${{ github.sha }}
          fail-build: true
          severity-cutoff: critical
          output-format: table
          output-file: grype-${{ matrix.image_name }}.txt
          cache-db: true
          only-fixed: true

      - name: Upload Grype report
        if: always() && hashFiles(format('grype-{0}.txt', matrix.image_name)) != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: grype-${{ matrix.image_name }}
          path: grype-${{ matrix.image_name }}.txt

  container-security-status:
    name: Container Security
    if: always()
    needs:
      - image-security
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        run: |
          if [[ "${{ needs.image-security.result }}" != "success" ]]; then
            echo "::error::Container Security dependency failed with result ${{ needs.image-security.result }}."
            exit 1
          fi
