name: Container Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

permissions:
  contents: read

concurrency:
  group: container-security-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  SYFT_VERSION: v1.42.2
  GRYPE_VERSION: v0.109.1

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_images: ${{ steps.filter.outputs.run_images }}
      image_matrix: ${{ steps.filter.outputs.image_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed areas
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        run: |
          python3 <<'PY'
          import fnmatch
          import json
          import os
          import subprocess

          ZERO = "0" * 40
          event = os.environ["EVENT_NAME"]
          before = os.environ.get("BEFORE_SHA", "")
          base = os.environ.get("BASE_SHA", "")
          head = os.environ["GITHUB_SHA"]

          if event == "pull_request":
            start = base
          elif before and before != ZERO:
            start = before
          else:
            start = ""

          if start:
            diff = subprocess.check_output(["git", "diff", "--name-only", start, head], text=True)
            files = [line for line in diff.splitlines() if line]
          else:
            files = ["__ALL__"]

          filters = {
            "workflow_config": [".github/actions/**", ".github/workflows/**"],
            "frontend": ["frontend/**"],
            "gateway": ["gateway/**"],
            "auth_service": ["backend/auth-service/**", "backend/pom.xml"],
            "api_service": ["backend/api-service/**", "backend/pom.xml"],
            "audit_service": ["backend/audit-service/**", "backend/pom.xml"],
            "mailer_service": ["backend/mailer-service/**", "backend/pom.xml"],
            "notification_service": ["backend/notification-service/**"],
          }

          def matches(patterns):
            if "__ALL__" in files:
              return True
            return any(fnmatch.fnmatch(path, pattern) for path in files for pattern in patterns)

          results = {name: matches(patterns) for name, patterns in filters.items()}
          image_entries = [
            {"image_name": "auth-service", "context": "backend/auth-service"},
            {"image_name": "api-service", "context": "backend/api-service"},
            {"image_name": "audit-service", "context": "backend/audit-service"},
            {"image_name": "mailer-service", "context": "backend/mailer-service"},
            {"image_name": "notification-service", "context": "backend/notification-service"},
            {"image_name": "gateway", "context": "gateway"},
            {"image_name": "frontend", "context": "frontend"},
          ]

          selected_images = [
            entry for entry in image_entries
            if results["workflow_config"] or (
              entry["image_name"] == "frontend" and results["frontend"]
            ) or (
              entry["image_name"] == "gateway" and results["gateway"]
            ) or (
              entry["image_name"] == "auth-service" and results["auth_service"]
            ) or (
              entry["image_name"] == "api-service" and results["api_service"]
            ) or (
              entry["image_name"] == "audit-service" and results["audit_service"]
            ) or (
              entry["image_name"] == "mailer-service" and results["mailer_service"]
            ) or (
              entry["image_name"] == "notification-service" and results["notification_service"]
            )
          ]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"run_images={'true' if selected_images else 'false'}\n")
            fh.write(f"image_matrix={json.dumps(selected_images)}\n")
          PY

  image-security:
    needs:
      - changes
    if: needs.changes.outputs.run_images == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.changes.outputs.image_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build local image
        run: |
          docker build \
            --pull \
            --tag "local/${{ matrix.image_name }}:${{ github.sha }}" \
            "${{ matrix.context }}"

      - name: Install Syft
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${SYFT_VERSION#v}_linux_amd64.tar.gz" -o "$tmp/syft.tar.gz"
          tar -xzf "$tmp/syft.tar.gz" -C "$tmp"
          install "$tmp/syft" /usr/local/bin/syft

      - name: Generate image SBOM
        run: |
          syft "docker:local/${{ matrix.image_name }}:${{ github.sha }}" \
            -o "spdx-json=sbom-${{ matrix.image_name }}.spdx.json"

      - name: Upload image SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-${{ matrix.image_name }}
          path: sbom-${{ matrix.image_name }}.spdx.json

      - name: Install Grype
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${GRYPE_VERSION#v}_linux_amd64.tar.gz" -o "$tmp/grype.tar.gz"
          tar -xzf "$tmp/grype.tar.gz" -C "$tmp"
          install "$tmp/grype" /usr/local/bin/grype

      - name: Scan image with Grype
        id: grype
        run: |
          set -o pipefail
          grype "docker:local/${{ matrix.image_name }}:${{ github.sha }}" \
            --only-fixed \
            --fail-on critical \
            -o table | tee "grype-${{ matrix.image_name }}.txt"

      - name: Upload Grype report
        if: always() && hashFiles(format('grype-{0}.txt', matrix.image_name)) != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: grype-${{ matrix.image_name }}
          path: grype-${{ matrix.image_name }}.txt

  container-security-status:
    name: Container Security
    if: always()
    needs:
      - changes
      - image-security
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream job results
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "::error::Container Security change detection failed with result ${{ needs.changes.result }}."
            exit 1
          fi
          if [[ "${{ needs.image-security.result }}" != "success" && "${{ needs.image-security.result }}" != "skipped" ]]; then
            echo "::error::Container Security dependency failed with result ${{ needs.image-security.result }}."
            exit 1
          fi
