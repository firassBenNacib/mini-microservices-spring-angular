name: Container Security

on:
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/container-security.yml"
      - "backend/**"
      - "frontend/**"
      - "gateway/**"
      - "scripts/**"
      - "docker-compose*.yml"
  push:
    branches:
      - main
    paths:
      - ".github/actions/**"
      - ".github/workflows/container-security.yml"
      - "backend/**"
      - "frontend/**"
      - "gateway/**"
      - "scripts/**"
      - "docker-compose*.yml"
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: container-security-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  image-security:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: auth-service
            context: backend/auth-service
          - image_name: api-service
            context: backend/api-service
          - image_name: audit-service
            context: backend/audit-service
          - image_name: mailer-service
            context: backend/mailer-service
          - image_name: notification-service
            context: backend/notification-service
          - image_name: gateway
            context: gateway
          - image_name: frontend
            context: frontend
    steps:
      - name: Harden runner and checkout
        uses: ./.github/actions/harden-checkout

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build local image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          provenance: false
          tags: local/${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha,scope=container-security-${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=container-security-${{ matrix.image_name }}

      - name: Generate image SBOM
        uses: anchore/sbom-action@da167eac915b4e86f08b264dbdbc867b61be6f0c # v0.20.5
        with:
          image: local/${{ matrix.image_name }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom-${{ matrix.image_name }}.spdx.json
          upload-artifact: "false"

      - name: Upload image SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ matrix.image_name }}
          path: sbom-${{ matrix.image_name }}.spdx.json

      - name: Scan image with Grype
        id: grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: local/${{ matrix.image_name }}:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: grype-${{ matrix.image_name }}.sarif
          cache-db: true

      - name: Upload Grype SARIF
        if: always() && hashFiles(format('grype-{0}.sarif', matrix.image_name)) != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        with:
          sarif_file: grype-${{ matrix.image_name }}.sarif
          category: grype-${{ matrix.image_name }}
