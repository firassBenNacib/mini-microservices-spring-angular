name: OSSF Scorecard

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 1"

permissions:
  security-events: write
  id-token: write
  contents: read
  actions: read

concurrency:
  group: scorecard-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@ea651e62978af7915d09fe2e282747c798bf2dab # v2.4.1
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@e753c89edeb6ea2333858f2dd740f46591744926 # v4.31.1
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard
