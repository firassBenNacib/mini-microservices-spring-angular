name: OSSF Scorecard

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 1"

permissions:
  contents: read
  actions: read

concurrency:
  group: scorecard-${{ github.ref || github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.json
          results_format: json
          publish_results: false

      - name: Upload Scorecard report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: scorecard-results
          path: scorecard-results.json

      - name: Write Scorecard summary
        run: |
          {
            echo "## OSSF Scorecard summary"
            echo
            echo "- result artifact: \`scorecard-results.json\`"
            echo "- upload artifact: \`scorecard-results\`"
            echo "- publish to GitHub code scanning: disabled"
          } >> "${GITHUB_STEP_SUMMARY}"
