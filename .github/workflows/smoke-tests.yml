name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Optional override for the deployed application URL
        required: false
        type: string
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

concurrency:
  group: smoke-tests-${{ github.ref || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    env:
      SMOKE_BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || vars.SMOKE_BASE_URL }}
      SMOKE_AUTH_EMAIL: ${{ secrets.SMOKE_AUTH_EMAIL }}
      SMOKE_AUTH_PASSWORD: ${{ secrets.SMOKE_AUTH_PASSWORD }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate smoke configuration
        run: |
          test -n "${SMOKE_BASE_URL}" || {
            echo "::error::Set repository variable SMOKE_BASE_URL or provide workflow_dispatch input base_url."
            exit 1
          }

      - name: Set smoke authentication mode
        run: |
          if [[ -n "${SMOKE_AUTH_EMAIL}" && -n "${SMOKE_AUTH_PASSWORD}" ]]; then
            echo "REQUIRE_AUTH_SMOKE=true" >> "${GITHUB_ENV}"
          else
            echo "REQUIRE_AUTH_SMOKE=false" >> "${GITHUB_ENV}"
          fi

      - name: Run deployed smoke tests
        run: bash ./scripts/smoke_test.sh --base-url "${SMOKE_BASE_URL}"
