[extend]
useDefault = true

[[allowlists]]
description = "Ignore false-positive internal gateway upstream host:port matches in nginx config"
paths = ['''^gateway/nginx\.conf$''']
regexTarget = "line"
regexes = [
  '''^\s*proxy_pass http://auth-service:8081;\s*$''',
  '''^\s*proxy_pass http://api-service:8082;\s*$''',
]

[[allowlists]]
description = "Ignore historical OpenAPI test false positive on test-only notify API key"
commits = ["9c2b343b5e9f40478c58c97a0158bbd76cb7850d"]
paths = ['''^backend/api-service/src/test/java/com/demo/devops/apiservice/web/ApiOpenApiDocumentationTest\.java$''']
regexTarget = "secret"
regexes = [
  '''test-notify-key-123''',
]
